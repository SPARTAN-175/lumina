<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Escuela Dominical</title>

<link rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div
class="hero-escuela"
onclick="toqueLogoEscuela()">

<img
src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65?w=1200"
alt="Escuela Dominical">

<div class="hero-texto">

<h2>
Escuela Dominical
</h2>

<p>
Aprendamos juntos de la Palabra de Dios
</p>

</div>

</div>

<div class="container">

<div class="card">

<h3>Temas recientes</h3>

<div id="listaTemas">

<div
class="tema-card"
onclick="
window.location.href=
'tema.html?tema=fe'
"
style="cursor:pointer;">

<div class="tema-icono azul">
📖
</div>

<div class="tema-info">

<div class="tema-cabecera">

<h4>¿Qué es la fe?</h4>

<small>16 Jun</small>

</div>

<p>Hebreos 11:1</p>

</div>

</div>

<div
class="tema-card"
onclick="
window.location.href=
'tema.html?tema=jesus'
"
style="cursor:pointer;">

<div class="tema-icono verde">
✝️
</div>

<div class="tema-info">

<div class="tema-cabecera">

<h4>¿Quién es Jesús?</h4>

<small>15 Jun</small>

</div>

<p>Juan 14:6</p>

</div>

</div>

  
 <div
class="tema-card"
onclick="
window.location.href=
'tema.html?tema=oracion'
"
style="cursor:pointer;">

<div class="tema-icono naranja">
🙏
</div>
<div class="tema-info">

<div class="tema-cabecera">

<h4>La oración</h4>

<small>14 Jun</small>

</div>

<p>Mateo 6</p>

</div>

</div>

</div>

<div id="temasOcultos" style="display:none;">

<div class="tema-card">

<div class="tema-icono azul">
🕊️
</div>

<div class="tema-info">

<div class="tema-cabecera">

<h4>El Espíritu Santo</h4>

<small>13 Jun</small>

</div>

<p>Juan 14:26</p>

</div>

</div>

<div class="tema-card">

<div class="tema-icono verde">
❤️
</div>

<div class="tema-info">

<div class="tema-cabecera">

<h4>El amor de Dios</h4>

<small>12 Jun</small>

</div>

<p>Juan 3:16</p>

</div>

</div>

</div>
  

<button
id="btnVerTemas"
class="btn-ver-temas"
onclick="toggleTemas()">

Ver todos los temas

</button>

</div>

</div>

<div id="menuInferior">

<button
onclick="window.location.href='index.html'">

🏠
<br>
Inicio

</button>

<button>

📚
<br>
Escuela

</button>

<button>

🙏
<br>
Oración

</button>

<button>

🤝
<br>
Ayuda

</button>

<button>

👤
<br>
Perfil

</button>

</div>

<script src="js/escuela.js?=v2"></script>



<div
id="panelAdminEscuela"
style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.2);
width:90%;
max-width:500px;
z-index:99999;
">
  <div
onclick="
document.getElementById(
'panelAdminEscuela'
).style.display='none'
"
style="
position:absolute;
top:10px;
right:15px;
font-size:24px;
cursor:pointer;
color:#666;
">

✕

</div>

<h3>
📚 Nuevo Tema
</h3>

<input
id="tituloTema"
placeholder="Título"
style="
width:100%;
padding:10px;
margin-bottom:10px;
box-sizing:border-box;
">

<input
id="versiculoTema"
placeholder="Versículo"
style="
width:100%;
padding:10px;
margin-bottom:10px;
box-sizing:border-box;
">

<textarea
id="textoVersiculoTema"
placeholder="Texto del versículo"
style="
width:100%;
height:80px;
margin-bottom:10px;
">
</textarea>

<textarea
id="resumenTema"
placeholder="Resumen"
style="
width:100%;
height:100px;
margin-bottom:10px;
">
</textarea>

<textarea
id="actividadTema"
placeholder="Actividad"
style="
width:100%;
height:100px;
margin-bottom:10px;
">
</textarea>

<button
onclick="publicarTema()"
style="
width:100%;
padding:12px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
">

Publicar tema

</button>

</div>

  projectId: "lumina-82c5e",

  storageBucket: "lumina-82c5e.firebasestorage.app",

</body>

</html>
