<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Escuela Dominical</title>

<link rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div
class="hero-escuela"
onclick="toqueLogoEscuela()">

<img
src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65?w=1200"
alt="Escuela Dominical">

<div class="hero-texto">

<h2>
Escuela Dominical
</h2>

<p>
Aprendamos juntos de la Palabra de Dios
</p>

</div>

</div>

<div class="container">

<div class="card">

<h3>Temas recientes</h3>

<div id="listaTemas"></div>




  

<button
id="btnVerTemas"
class="btn-ver-temas"
onclick="toggleTemas()">

Ver todos los temas

</button>

</div>

</div>

<div id="menuInferior">

<button
onclick="window.location.href='index.html'">

🏠
<br>
Inicio

</button>

<button>

📚
<br>
Escuela

</button>

<button>

🙏
<br>
Oración

</button>

<button>

🤝
<br>
Ayuda

</button>

<button>

👤
<br>
Perfil

</button>

</div>




<div
id="panelAdminEscuela"
style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.2);
width:90%;
max-width:500px;
z-index:99999;
">
  <div
onclick="
document.getElementById(
'panelAdminEscuela'
).style.display='none'
"
style="
position:absolute;
top:10px;
right:15px;
font-size:24px;
cursor:pointer;
color:#666;
">

✕

</div>

<h3>
📚 Nuevo Tema
</h3>

<input
id="tituloTema"
placeholder="Título"
style="
width:100%;
padding:10px;
margin-bottom:10px;
box-sizing:border-box;
">

<input
id="versiculoTema"
placeholder="Versículo"
style="
width:100%;
padding:10px;
margin-bottom:10px;
box-sizing:border-box;
">

<textarea
id="textoVersiculoTema"
placeholder="Texto del versículo"
style="
width:100%;
height:80px;
margin-bottom:10px;
">
</textarea>

<textarea
id="resumenTema"
placeholder="Resumen"
style="
width:100%;
height:100px;
margin-bottom:10px;
">
</textarea>

<textarea
id="actividadTema"
placeholder="Actividad"
style="
width:100%;
height:100px;
margin-bottom:10px;
">
</textarea>

<button
onclick="publicarTema()"
style="
width:100%;
padding:12px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
">

Publicar tema

</button>

</div>




<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",

  authDomain: "lumina-82c5e.firebaseapp.com",

  projectId: "lumina-82c5e",

  storageBucket: "lumina-82c5e.firebasestorage.app",

  messagingSenderId: "941054906075",

  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
  
window.query = query;
window.orderBy = orderBy;
window.onSnapshot = onSnapshot;
window.firebaseListo = true;


console.log(
"Firebase Escuela conectado"
);

const consulta = query(

    collection(
        db,
        "temas_escuela"
    ),

    orderBy(
        "fecha",
        "desc"
    )

);


onSnapshot(
    consulta,
    (snapshot)=>{

        const lista =
        document.getElementById(
            "listaTemas"
        );

      document.getElementById(
    "btnVerTemas"
).textContent =

mostrarTodos

? "Ocultar temas"

: "Ver todos los temas";

        lista.innerHTML = "";

       const mostrarTodos =

localStorage.getItem(
    "mostrarTodosTemas"
) === "true";
      
      let contador = 0;
      
      snapshot.forEach((docu)=>{


        contador++;

if(
    !mostrarTodos &&
    contador > 3
){

    return;

}

            const tema =
            docu.data();

            const idTema =
            docu.id;

            lista.innerHTML += `
                <div class="tema-card"
                 onclick=" window.location.href='tema.html?id=${idTema}'"
                 style="cursor:pointer;">

                    <div class="tema-icono azul">
                        📖
                    </div>

                    <div class="tema-info">

                        <div class="tema-cabecera">

                            <h4>${tema.titulo}</h4>

                            <small>
                                ${new Date(
                                    tema.fecha
                                ).toLocaleDateString()}
                            </small>

                        </div>

                        <p>
                            ${tema.versiculo}
                        </p>

                    </div>

                </div>
            `;

        });

    }
);

  

</script>

<script src="js/escuela.js?=v3"></script>


  
</body>

</html>
