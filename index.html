<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMINA</title>

<style>

/* ======================================
   ESTILOS GENERALES
====================================== */

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f7fa;
    color:#333;
}

header{
    background:linear-gradient(135deg,#1E3A8A,#2563EB);
    color:white;
    padding:30px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-top:0;
}

.versiculo{
    font-weight:bold;
    color:#1E3A8A;
    font-size:20px;
}

.pregunta{
    margin-top:15px;
    background:#eef2ff;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>✨ LUMINA</h1>

<p>
"Lámpara es a mis pies tu palabra,
y lumbrera a mi camino."
<br>
Salmo 119:105
</p>

</header>

<div class="container">

<div class="card">

<h2>📖 Reflexión del Día</h2>

<div id="versiculo" class="versiculo">
Cargando...
</div>

<p id="texto">
Cargando reflexión...
</p>

<div id="pregunta" class="pregunta">
Cargando pregunta...
</div>

</div>

</div>

<script type="module">

/* ======================================
   IMPORTAR FIREBASE
====================================== */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ======================================
   CONFIGURACIÓN FIREBASE
====================================== */

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",

  authDomain: "lumina-82c5e.firebaseapp.com",

  projectId: "lumina-82c5e",

  storageBucket: "lumina-82c5e.firebasestorage.app",

  messagingSenderId: "941054906075",

  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"
};

/* ======================================
   INICIALIZAR FIREBASE
====================================== */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ======================================
   CARGAR REFLEXIÓN ACTUAL
====================================== */

async function cargarReflexion(){

  const referencia =
      doc(db,"reflexion_actual","actual");

  const documento =
      await getDoc(referencia);

  if(documento.exists()){

      const datos = documento.data();

      document.getElementById("versiculo")
      .textContent = datos.versiculo;

      document.getElementById("texto")
      .textContent = datos.texto;

      document.getElementById("pregunta")
      .textContent = "❓ " + datos.pregunta;

  }

}

/* ======================================
   INICIAR APP
====================================== */

cargarReflexion();

</script>

</body>
</html>
