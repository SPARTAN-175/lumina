<script type="module">

/* ======================================
   IMPORTAR FIREBASE
====================================== */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  updateDoc,
  increment,
  setDoc,
  deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ======================================
   CONFIGURACIÓN FIREBASE
====================================== */

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",

  authDomain: "lumina-82c5e.firebaseapp.com",

  projectId: "lumina-82c5e",

  storageBucket: "lumina-82c5e.firebasestorage.app",

  messagingSenderId: "941054906075",

  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"
};

/* ======================================
   INICIALIZAR FIREBASE
====================================== */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ======================================
   CARGAR COMENTARIOS
====================================== */

async function cargarComentarios(){

  const contenedor =
      document.getElementById("comentarios");

  contenedor.innerHTML = "";

   const listaCompleta = document.getElementById( "listaComentariosCompleta");

  listaCompleta.innerHTML = "";

  const consulta = query(

  collection(
    db,
    "comentarios_reflexion"
  ),

  orderBy(
    "fecha",
    "asc"
  )

);

let cantidadAnterior = 0;
   
onSnapshot(
  consulta,
  (snapshot)=>{

      contenedor.innerHTML = "";
      listaCompleta.innerHTML = "";

      let totalComentarios =
          snapshot.size;

      document
      .getElementById(
        "btnVerComentarios"
      )
      .textContent =
      `Ver comentarios (${totalComentarios})`;

      snapshot.forEach((docu)=>{

          const datos =
              docu.data();
         const comentarioId =
             docu.id;


      const miUsuario =
localStorage.getItem(
    "lumina_usuario"
);

const esMio =
datos.usuarioId === miUsuario;


   
         const amen =
             datos.amen || 0;

         const edifico =
             datos.edifico || 0;


         
         const tarjeta = `

<div style="
display:flex;
justify-content:${esMio ? "flex-end" : "flex-start"};
margin-top:10px;
">

<div style="
width:fit-content;
max-width:180px;
word-wrap:break-word;
overflow-wrap:break-word;
white-space:pre-wrap;
background:${esMio ? "#dbeafe" : "white"};
padding:8px 10px;
border-radius:12px;
box-shadow:0 1px 5px rgba(0,0,0,.08);
">

<div style="
display:flex;
align-items:center;
gap:10px;
">

<strong style="font-size:13px;">
${datos.nombre}
</strong>

<small style="
color:gray;
font-size:10px;
">
${new Date(
  datos.fecha
).toLocaleTimeString()}
</small>

</div>

<div style="margin-top:4px;">
${datos.comentario}
</div>

<div style="
display:flex;
gap:6px;
margin-top:4px;
">

<button
onclick="reaccionAmen('${comentarioId}')"
style="
border:none;
background:#eef2ff;
padding:4px 8px;
font-size:12px;
border-radius:20px;
cursor:pointer;
">
🙏 ${amen}
</button>

<button
onclick="reaccionEdifico('${comentarioId}')"
style="
border:none;
background:#fee2e2;
padding:4px 8px;
font-size:12px;
border-radius:20px;
cursor:pointer;
">
❤️ ${edifico}
</button>

</div>

</div>

</div>

`;

          contenedor.innerHTML +=
              tarjeta;

          listaCompleta.innerHTML +=
              tarjeta;

      });
                   if(
    cantidadAnterior > 0 &&
    snapshot.size > cantidadAnterior
){

    document
    .getElementById(
        "nuevoComentario"
    )
    .style.display = "block";

}

cantidadAnterior =
snapshot.size;   
                      

  }

);


}

/* ======================================
   AGREGAR COMENTARIO
====================================== */
/* ======================================
   REFLEXIÓN DEL DÍA
====================================== */

window.cargarReflexion = function(){

    const referencia =
    doc(
        db,
        "reflexion_actual",
        "actual"
    );

    onSnapshot(
        referencia,
        (documento)=>{

            if(documento.exists()){

                const datos =
                documento.data();

                document
                .getElementById(
                    "versiculo"
                )
                .textContent =
                datos.versiculo;

                document
                .getElementById(
                    "texto"
                )
                .textContent =
                datos.texto;

                document
                .getElementById(
                    "pregunta"
                )
                .textContent =
                "❓ " +
                datos.pregunta;

                document
                .getElementById(
                    "versiculoFijo"
                )
                .textContent =
                datos.versiculo;

                document
                .getElementById(
                    "preguntaFija"
                )
                .textContent =
                "❓ " +
                datos.pregunta;

            }

        }

    );

};
   

/* ======================================
   MOSTRAR FORMULARIO
====================================== */

function agregarComentario(){

  document
    .getElementById("formularioComentario")
    .style.display = "block";

  const usuarioId =
      localStorage.getItem("lumina_usuario");

  if(usuarioId){

      document
      .getElementById("nombreComentario")
      .style.display = "none";

  }

}

/* ======================================
   PUBLICAR COMENTARIO
====================================== */

async function publicarComentario(){

  let usuarioId =
      localStorage.getItem("lumina_usuario");

  let nombre = "";

  if(!usuarioId){

      nombre =
        document.getElementById(
          "nombreComentario"
        ).value.trim();

      if(!nombre){

          alert("Escribe tu nombre");

          return;
      }

      const nuevoUsuario =
        await addDoc(
          collection(db,"usuarios"),
          {
            nombre,
            fecha: Date.now()
          }
        );

      usuarioId = nuevoUsuario.id;

      localStorage.setItem(
        "lumina_usuario",
        usuarioId
      );

  }else{

      const usuarioDoc =
        await getDoc(
          doc(db,"usuarios",usuarioId)
        );

      nombre =
        usuarioDoc.data().nombre;

     document
.getElementById("usuarioActual")
.style.display = "block";

document
.getElementById("usuarioActual")
.textContent =
"Comentando como: " + nombre;

      document
      .getElementById(
        "nombreComentario"
      )
      .value = nombre;

  }

  const comentario =
    document
    .getElementById(
      "textoComentario"
    )
    .value
    .trim();

  if(!comentario){

      alert(
        "Escribe un comentario"
      );

      return;
  }

  await addDoc(
  collection(
    db,
    "comentarios_reflexion"
  ),
  {
    usuarioId,
    nombre,
    comentario,
    fecha: Date.now(),

    amen: 0,
    edifico: 0
  }
);

  document
  .getElementById(
    "textoComentario"
  )
  .value = "";

   document
.getElementById(
  "formularioComentario"
)
.style.display = "none";

  cargarComentarios();

}

async function enviarComentarioRapido(){

  const texto =
  document
  .getElementById(
    "textoComentarioRapido"
  )
  .value
  .trim();

  if(!texto){

    alert(
      "Escribe un comentario"
    );

    return;
  }

  document
  .getElementById(
    "textoComentario"
  )
  .value = texto;

  await publicarComentario();

  document
  .getElementById(
    "textoComentarioRapido"
  )
  .value = "";

}




window.reaccionAmen = async function(comentarioId){

    const clave =
    "amen_" + comentarioId;

    if(
        localStorage.getItem(clave)
    ){
        return;
    }

    await updateDoc(

        doc(
            db,
            "comentarios_reflexion",
            comentarioId
        ),

        {
            amen: increment(1)
        }

    );

    localStorage.setItem(
        clave,
        "true"
    );

};


window.reaccionEdifico = async function(comentarioId){

    const clave =
    "edifico_" + comentarioId;

    if(
        localStorage.getItem(clave)
    ){

        return;
    }

    await updateDoc(

        doc(
            db,
            "comentarios_reflexion",
            comentarioId
        ),

        {
            edifico: increment(1)
        }

    );

    localStorage.setItem(
        clave,
        "true"
    );

};


let contadorToques = 0;


window.toqueLogo = function(){

    contadorToques++;

    if(contadorToques >= 5){

        document
        .getElementById(
            "panelAdmin"
        )
        .style.display = "block";

        contadorToques = 0;

    }

};


window.publicarNuevaReflexion =
async function(){

    const versiculo =
    document.getElementById(
        "nuevoVersiculo"
    ).value.trim();

    const texto =
    document.getElementById(
        "nuevoTexto"
    ).value.trim();

    const pregunta =
    document.getElementById(
        "nuevaPregunta"
    ).value.trim();

    if(
        !versiculo ||
        !texto ||
        !pregunta
    ){
        alert(
          "Completa todos los campos"
        );
        return;
    }

    await setDoc(

        doc(
            db,
            "reflexion_actual",
            "actual"
        ),

        {
            versiculo,
            texto,
            pregunta
        }

    );

    const comentarios =
    await getDocs(
        collection(
            db,
            "comentarios_reflexion"
        )
    );

    for(
        const comentario
        of comentarios.docs
    ){

        await deleteDoc(
            comentario.ref
        );

    }

    document
    .getElementById(
        "nuevoVersiculo"
    )
    .value = "";

    document
    .getElementById(
        "nuevoTexto"
    )
    .value = "";

    document
    .getElementById(
        "nuevaPregunta"
    )
    .value = "";

    document
    .getElementById(
        "panelAdmin"
    )
    .style.display = "none";

    document
.getElementById(
    "mensajeExito"
)
.style.display = "block";

setTimeout(()=>{

    document
    .getElementById(
        "mensajeExito"
    )
    .style.display = "none";

},3000);

};



window.autoExpandir = function(textarea){

    textarea.style.height = "auto";
    textarea.style.height =
    textarea.scrollHeight + "px";

};



   
/* ======================================
   INICIAR APP
====================================== */
   
window.agregarComentario =
    agregarComentario;

window.publicarComentario =
    publicarComentario;

window.enviarComentarioRapido =
enviarComentarioRapido;

cargarReflexion();

cargarComentarios();




   
</script>
