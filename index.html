<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMINA</title>

<style>

/* ======================================
   ESTILOS GENERALES
====================================== */

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f7fa;
    color:#333;
}

header{
    background:linear-gradient(135deg,#1E3A8A,#2563EB);
    color:white;
    padding:30px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-top:0;
}

.versiculo{
    font-weight:bold;
    color:#1E3A8A;
    font-size:20px;
}

.pregunta{
    margin-top:15px;
    background:#eef2ff;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>✨ LUMINA</h1>

<p>
"Lámpara es a mis pies tu palabra,
y lumbrera a mi camino."
<br>
Salmo 119:105
</p>

</header>

<div class="container">

<div class="card">

<h2>📖 Reflexión del Día</h2>

<div id="versiculo" class="versiculo">
Cargando...
</div>

<p id="texto">
Cargando reflexión...
</p>

<div id="pregunta" class="pregunta">
Cargando pregunta...
</div>

<hr style="margin:20px 0;">

<h3>💬 Comunidad</h3>

<button
id="btnVerComentarios"
style="
width:100%;
padding:12px;
background:#eef2ff;
border:none;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
">
Ver comentarios (0)
</button>

<div
id="comentarios"
style="display:none;">

<p>Cargando comentarios...</p>

</div>

<button id="btnComentario"
   onclick="agregarComentario()"
style="
margin-top:15px;
padding:10px;
background:#2563EB;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">

Agregar comentario

</button>



   <div id="formularioComentario"
style="
display:none;
margin-top:15px;
">

<div
id="usuarioActual"
style="
display:none;
margin-bottom:10px;
padding:10px;
background:#eef2ff;
border-radius:8px;
font-weight:bold;
">
</div>

<input
id="nombreComentario"
placeholder="Tu nombre"
style="
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
">

<textarea
id="textoComentario"
placeholder="Escribe tu comentario..."
style="
width:100%;
padding:10px;
height:100px;
border:1px solid #ccc;
border-radius:8px;
"></textarea>

<button
id="btnPublicar"
onclick="publicarComentario()"
style="
margin-top:10px;
padding:10px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
Publicar comentario
</button>

   </div>

   
</div>

</div>

<script type="module">

/* ======================================
   IMPORTAR FIREBASE
====================================== */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs,
  addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ======================================
   CONFIGURACIÓN FIREBASE
====================================== */

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",

  authDomain: "lumina-82c5e.firebaseapp.com",

  projectId: "lumina-82c5e",

  storageBucket: "lumina-82c5e.firebasestorage.app",

  messagingSenderId: "941054906075",

  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"
};

/* ======================================
   INICIALIZAR FIREBASE
====================================== */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ======================================
   CARGAR REFLEXIÓN ACTUAL
====================================== */

async function cargarReflexion(){

  const referencia =
      doc(db,"reflexion_actual","actual");

  const documento =
      await getDoc(referencia);

  if(documento.exists()){

      const datos = documento.data();

      document.getElementById("versiculo")
      .textContent = datos.versiculo;

      document.getElementById("texto")
      .textContent = datos.texto;

      document.getElementById("pregunta")
      .textContent = "❓ " + datos.pregunta;

  }

}


/* ======================================
   CARGAR COMENTARIOS
====================================== */

async function cargarComentarios(){

  const contenedor =
      document.getElementById("comentarios");

  contenedor.innerHTML = "";

  const consulta =
  await getDocs(
    collection(db,"comentarios_reflexion")
  );

let totalComentarios =
    consulta.size;

document
.getElementById(
  "btnVerComentarios"
)
.textContent =
`Ver comentarios (${totalComentarios})`;
   
  consulta.forEach((docu)=>{

      const datos = docu.data();

      contenedor.innerHTML += `
      <div style="
        background:#f5f5f5;
        padding:10px;
        margin-top:10px;
        border-radius:8px;
      ">
        <strong>${datos.nombre}</strong><br>

<small style="color:gray;">
${new Date(datos.fecha).toLocaleString()}
</small>

<br><br>

${datos.comentario}
      </div>
      `;

  });

}

/* ======================================
   AGREGAR COMENTARIO
====================================== */

   

/* ======================================
   MOSTRAR FORMULARIO
====================================== */

function agregarComentario(){

  document
    .getElementById("formularioComentario")
    .style.display = "block";

  const usuarioId =
      localStorage.getItem("lumina_usuario");

  if(usuarioId){

      document
      .getElementById("nombreComentario")
      .style.display = "none";

  }

}


/* ======================================
   PUBLICAR COMENTARIO
====================================== */

async function publicarComentario(){

  let usuarioId =
      localStorage.getItem("lumina_usuario");

  let nombre = "";

  if(!usuarioId){

      nombre =
        document.getElementById(
          "nombreComentario"
        ).value.trim();

      if(!nombre){

          alert("Escribe tu nombre");

          return;
      }

      const nuevoUsuario =
        await addDoc(
          collection(db,"usuarios"),
          {
            nombre,
            fecha: Date.now()
          }
        );

      usuarioId = nuevoUsuario.id;

      localStorage.setItem(
        "lumina_usuario",
        usuarioId
      );

  }else{

      const usuarioDoc =
        await getDoc(
          doc(db,"usuarios",usuarioId)
        );

      nombre =
        usuarioDoc.data().nombre;

     document
.getElementById("usuarioActual")
.style.display = "block";

document
.getElementById("usuarioActual")
.textContent =
"Comentando como: " + nombre;

      document
      .getElementById(
        "nombreComentario"
      )
      .value = nombre;

  }

  const comentario =
    document
    .getElementById(
      "textoComentario"
    )
    .value
    .trim();

  if(!comentario){

      alert(
        "Escribe un comentario"
      );

      return;
  }

  await addDoc(
      collection(
        db,
        "comentarios_reflexion"
      ),
      {
        usuarioId,
        nombre,
        comentario,
        fecha: Date.now()
      }
  );

  document
  .getElementById(
    "textoComentario"
  )
  .value = "";

   document
.getElementById(
  "formularioComentario"
)
.style.display = "none";

  cargarComentarios();

  alert(
    "Comentario publicado ✅"
  );

}

/* ======================================
   INICIAR APP
====================================== */
   
window.agregarComentario =
    agregarComentario;

window.publicarComentario =
    publicarComentario;
   
cargarReflexion();

cargarComentarios();




   
</script>

</body>
</html>
