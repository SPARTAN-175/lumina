<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Comentarios</title>

<link
rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div class="container">

<h2 id="tituloChatTema">
💬 Comentarios
</h2>



<div
id="listaComentariosTema"
style="
margin-top:20px;
padding-bottom:100px;
"
>
</div>

  



  

</div>

<script>

const parametros =
new URLSearchParams(
window.location.search
);

const idTema =
parametros.get("id");



</script>





<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    where,
    orderBy,
    onSnapshot,
    doc,
    getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",
  authDomain: "lumina-82c5e.firebaseapp.com",
  projectId: "lumina-82c5e",
  storageBucket: "lumina-82c5e.firebasestorage.app",
  messagingSenderId: "941054906075",
  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

console.log(
"Firebase Chat Tema conectado"
);



  window.guardarComentarioTema =
async function(){

    const comentario =

document.getElementById(
    "textoComentarioRapido"
).value.trim();

    if(!comentario){

        alert(
            "Escribe un comentario"
        );

        return;

    }

    

  const usuarioId =
localStorage.getItem(
    "lumina_usuario"
);

let nombre =
"Anónimo";


  
  if(usuarioId){

    const usuarioDoc =
    await getDoc(

        doc(
            db,
            "usuarios",
            usuarioId
        )

    );


    console.log(
    "Usuario encontrado:",
    usuarioDoc.data()
);
    

    if(usuarioDoc.exists()){

        nombre =
        usuarioDoc.data().nombre;

    }

}
  
  
  await addDoc(

        collection(
            db,
            "comentarios_temas"
        ),

      {
    temaId: idTema,
    usuarioId,
    nombre,
    comentario,
    fecha: Date.now()
      }

    );




    document.getElementById(
    "textoComentarioRapido"
).value = "";

};



window.enviarComentarioRapido =
async function(){

    await guardarComentarioTema();

    document
    .getElementById(
        "textoComentarioRapido"
    )
    .value = "";

};




  

  const consulta = query(

    collection(
        db,
        "comentarios_temas"
    ),

    where(
        "temaId",
        "==",
        idTema
    ),

    orderBy(
        "fecha",
        "asc"
    )

);

onSnapshot(
    consulta,
    (snapshot)=>{

        console.log(
            "Comentarios encontrados:",
            snapshot.size
        );

        const lista =
        document.getElementById(
            "listaComentariosTema"
        );

        lista.innerHTML = "";

        snapshot.forEach((docu)=>{

            const comentario =
            docu.data();

      
             const miUsuario =
            localStorage.getItem(
                 "lumina_usuario"
            );

              const esMio =
              comentario.usuarioId ===
              miUsuario;
          

           lista.innerHTML += `

<div style="
display:flex;
justify-content:${
esMio
? "flex-end"
: "flex-start"
};
margin:10px 0;
">

<div style="
background:${
esMio
? "#dbeafe"
: "#ffffff"
};

padding:10px;
border-radius:12px;
max-width:300px;

word-wrap:break-word;
overflow-wrap:break-word;
word-break:break-word;

box-shadow:
0 1px 5px rgba(0,0,0,.1);
">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:5px;
">

<b>
${comentario.nombre}
</b>

<small style="
color:gray;
font-size:11px;
margin-left:10px;
">
${new Date(
    comentario.fecha
).toLocaleTimeString()}
</small>

</div>

${comentario.comentario}

</div>

</div>

`; 

        });

      window.scrollTo(
    0,
    document.body.scrollHeight
);

    }
);




  window.autoExpandir = function(textarea){

    textarea.style.height = "auto";

    textarea.style.height =
    textarea.scrollHeight + "px";

};

</script>




<div
id="barraComentario"
style="
position:fixed;
bottom:10px;
left:0;
right:0;
background:white;
padding:6px 8px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
z-index:999;
gap:8px;
align-items:center;
display:flex;
">

<textarea
id="textoComentarioRapido"
placeholder="Escribe tu opinión..."
oninput="autoExpandir(this)"
style="
flex:1;
min-height:34px;
max-height:120px;
padding:8px;
border:1px solid #ccc;
border-radius:24px;
resize:none;
">
</textarea>

<button
onclick="enviarComentarioRapido()"
style="
width:42px;
height:34px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
">
➤
</button>

</div>

  
</body>

</html>
