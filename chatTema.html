<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Comentarios</title>

<link
rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div class="container">

<h2>
💬 Comentarios del tema
</h2>

<p id="idTemaActual">
Cargando...
</p>

<div
id="listaComentariosTema"
style="
margin-top:20px;
">
</div>

  



  

</div>

<script>

const parametros =
new URLSearchParams(
window.location.search
);

const idTema =
parametros.get("id");

document.getElementById(
"idTemaActual"
).textContent =
"ID del tema: " +
idTema;

</script>





<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    where,
    orderBy,
    onSnapshot,
    doc,
    getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",
  authDomain: "lumina-82c5e.firebaseapp.com",
  projectId: "lumina-82c5e",
  storageBucket: "lumina-82c5e.firebasestorage.app",
  messagingSenderId: "941054906075",
  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

console.log(
"Firebase Chat Tema conectado"
);



  window.guardarComentarioTema =
async function(){

    const comentario =

    document.getElementById(
        "comentarioTema"
    ).value.trim();

    if(!comentario){

        alert(
            "Escribe un comentario"
        );

        return;

    }

    

  const usuarioId =
localStorage.getItem(
    "lumina_usuario"
);

let nombre =
"Anónimo";


  
  if(usuarioId){

    const usuarioDoc =
    await getDoc(

        doc(
            db,
            "usuarios",
            usuarioId
        )

    );

    if(usuarioDoc.exists()){

        nombre =
        usuarioDoc.data().nombre;

    }

}
  
  
  await addDoc(

        collection(
            db,
            "comentarios_temas"
        ),

        {
            temaId: idTema,
            nombre,
            comentario,
            fecha: Date.now()
        }

    );




  

    alert(
        "Comentario publicado"
    );

    document.getElementById(
        "comentarioTema"
    ).value = "";

};


  const consulta = query(

    collection(
        db,
        "comentarios_temas"
    ),

    where(
        "temaId",
        "==",
        idTema
    ),

    orderBy(
        "fecha",
        "asc"
    )

);

onSnapshot(
    consulta,
    (snapshot)=>{

        console.log(
            "Comentarios encontrados:",
            snapshot.size
        );

        const lista =
        document.getElementById(
            "listaComentariosTema"
        );

        lista.innerHTML = "";

        snapshot.forEach((docu)=>{

            const comentario =
            docu.data();

            lista.innerHTML += `

<div style="
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 1px 5px rgba(0,0,0,.1);
word-wrap:break-word;
overflow-wrap:break-word;
word-break:break-word;
">

<strong>
${comentario.nombre}
</strong>

<p>
${comentario.comentario}
</p>

</div>

`;

        });

    }
);




  

</script>




<textarea
id="comentarioTema"
placeholder="Escribe un comentario..."
style="
width:100%;
height:100px;
padding:10px;
margin-top:15px;
box-sizing:border-box;
">
</textarea>

<button
onclick="guardarComentarioTema()"
style="
width:100%;
padding:12px;
margin-top:10px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
">

Publicar comentario

</button>

  
</body>

</html>
