<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Comentarios</title>

<link
rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div class="container">

<h2>
💬 Comentarios del tema
</h2>

<p id="idTemaActual">
Cargando...
</p>

</div>

<script>

const parametros =
new URLSearchParams(
window.location.search
);

const idTema =
parametros.get("id");

document.getElementById(
"idTemaActual"
).textContent =
"ID del tema: " +
idTema;

</script>

</body>

</html>
