<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Comentarios</title>

<link
rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div class="container">

<h2>
💬 Comentarios del tema
</h2>

<p id="idTemaActual">
Cargando...
</p>


<textarea
id="comentarioTema"
placeholder="Escribe un comentario..."
style="
width:100%;
height:100px;
padding:10px;
margin-top:15px;
box-sizing:border-box;
">
</textarea>

<button
onclick="guardarComentarioTema()"
style="
width:100%;
padding:12px;
margin-top:10px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
">

Publicar comentario

</button>

<div
id="listaComentariosTema"
style="
margin-top:20px;
">
</div>
  

</div>

<script>

const parametros =
new URLSearchParams(
window.location.search
);

const idTema =
parametros.get("id");

document.getElementById(
"idTemaActual"
).textContent =
"ID del tema: " +
idTema;

</script>

</body>

</html>
