<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Oración</title>

<link
rel="stylesheet"
href="css/estilos.css">

</head>

<body>

<div class="container">

<h2>
Peticiones de Oración
</h2>

<div
id="listaPeticiones"
style="
padding-bottom:140px;
">
</div>

<div
id="formularioPeticion"
style="
display:none;
background:#f8fafc;
padding:15px;
border-radius:12px;
margin-top:15px;
border:1px solid #e5e7eb;
">

<textarea
id="textoPeticion"
placeholder="Escribe tu petición de oración..."
style="
width:100%;
min-height:120px;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
resize:vertical;
">
</textarea>

<button
onclick="guardarPeticion()"
style="
width:100%;
padding:12px;
margin-top:10px;
background:#dc2626;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
">

Publicar petición

</button>

</div>

</div>

<button
id="btnNuevaPeticion"
onclick="mostrarFormularioPeticion()"
style="
position:fixed;
bottom:80px;
left:15px;
right:15px;

padding:14px;

background:#dc2626;
color:white;

border:none;
border-radius:15px;

font-size:16px;
font-weight:bold;

cursor:pointer;

box-shadow:
0 2px 10px rgba(0,0,0,.2);

z-index:999;
">

+ Nueva petición

</button>

<div id="menuInferior">

<button
onclick="window.location.href='index.html'">

🏠 <br>
Inicio

</button>

<button
onclick="window.location.href='escuela.html'">

📚 <br>
Escuela

</button>

<button>

🙏 <br>
Oración

</button>

<button>

🤝 <br>
Ayuda

</button>

<button>

👤 <br>
Perfil

</button>

</div>





<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    doc,
    getDoc,
    updateDoc,
    increment
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyB_jJZdMdVIhy9OT8R9Z8XsbRTNCJpgtsY",
  authDomain: "lumina-82c5e.firebaseapp.com",
  projectId: "lumina-82c5e",
  storageBucket: "lumina-82c5e.firebasestorage.app",
  messagingSenderId: "941054906075",
  appId: "1:941054906075:web:bd4e4741a9c3c87a5a86fe"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.mostrarFormularioPeticion =
function(){

    document
    .getElementById(
        "formularioPeticion"
    )
    .style.display =
    "block";

};

window.guardarPeticion =
async function(){

    const peticion =

    document
    .getElementById(
        "textoPeticion"
    )
    .value
    .trim();

    if(!peticion){

        return;

    }

    const usuarioId =
    localStorage.getItem(
        "lumina_usuario"
    );

    if(!usuarioId){

        alert(
        "Primero comenta en Reflexión Diaria para registrar tu nombre."
        );

        return;

    }

    const usuarioDoc =
    await getDoc(

        doc(
            db,
            "usuarios",
            usuarioId
        )

    );

    if(!usuarioDoc.exists()){

        alert(
        "Usuario no encontrado."
        );

        return;

    }

    const nombre =
    usuarioDoc.data().nombre;

    await addDoc(

        collection(
            db,
            "peticiones_oracion"
        ),

        {
            usuarioId,
            nombre,
            peticion,
            fecha: Date.now(),
            orando: 0,
            activa: true
        }

    );

    document
    .getElementById(
        "textoPeticion"
    )
    .value = "";

    document
    .getElementById(
        "formularioPeticion"
    )
    .style.display =
    "none";

};

window.estoyOrando =
async function(idPeticion){

    const clave =
    "orando_" +
    idPeticion;

    if(
        localStorage.getItem(
            clave
        )
    ){

        return;

    }

    await updateDoc(

        doc(
            db,
            "peticiones_oracion",
            idPeticion
        ),

        {
            orando:
            increment(1)
        }

    );

    localStorage.setItem(
        clave,
        "true"
    );

};

const consulta = query(

    collection(
        db,
        "peticiones_oracion"
    ),

    orderBy(
        "fecha",
        "desc"
    )

);

onSnapshot(
    consulta,
    (snapshot)=>{

        const lista =
        document.getElementById(
            "listaPeticiones"
        );

        lista.innerHTML = "";

        snapshot.forEach((docu)=>{

            const datos =
            docu.data();

            const peticionCorta =
datos.peticion.length < 180;

            lista.innerHTML += `

<div style="
background:white;
padding:15px;
margin-bottom:15px;
border-radius:15px;
box-shadow:
0 2px 8px rgba(0,0,0,.08);
">

<b>
${datos.nombre}
</b>

<p style="
margin:6px 0;
font-size:14px;
color:#374151;

display:-webkit-box;
-webkit-line-clamp:5;
-webkit-box-orient:vertical;

overflow:hidden;

line-height:1.4;
">
${datos.peticion}
</p>

${!peticionCorta ? `
<small
onclick="
this.previousElementSibling.style.display='block';
this.style.display='none';
"
style="
color:#2563EB;
cursor:pointer;
font-weight:bold;
font-size:12px;
">
Ver más
</small>
` : ""}

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
">

<small style="
color:gray;
font-size:11px;
">
${new Date(
    datos.fecha
).toLocaleTimeString()}
</small>

<div style="
text-align:right;
">

<button
onclick="estoyOrando('${docu.id}')"
style="
border:none;
background:#fee2e2;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
font-size:12px;
">

🙏 Estoy orando

</button>

<div style="
font-size:11px;
color:#666;
margin-top:3px;
">

${datos.orando || 0}
personas orando

</div>

</div>

</div>

`;

        });

    }
);

</script>








  
</body>

</html>
